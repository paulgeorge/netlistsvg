<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>netlistsvg demo</title>
        <style>
            body {
                font-family: sans-serif;
                padding-left: 20px;
            }
            textarea {
                font-family: monospace;
            }
            @media (prefers-color-scheme: dark) {
                body {
                    background: #1a1a2e;
                    color: #e8e8e8;
                }
                a { color: #7b8cde; }
                textarea, select {
                    background: #16213e;
                    color: #e8e8e8;
                    border: 1px solid #2a2a4a;
                }
                button {
                    background: #2a2a4a;
                    color: #e8e8e8;
                    border: 1px solid #3a3a5a;
                }
                #svgArea {
                    filter: invert(1) hue-rotate(180deg);
                }
            }
        </style>
    </head>
    <body>
        <p>
            This is a demo of <a href="https://github.com/paulgeorge/netlistsvg">netlistsvg</a>.
            See the <a href="gallery.html">Circuit Gallery</a> for example schematics.
        </p>
        <div style=display:flex>
            <div>
                <div style=display:flex;justify-content:space-between>
                    <button id=formatButton>Format JSON</button>
                    <div>
                        <label for=skinSelect>Select skin:</label>
                        <select id=skinSelect></select>
                        <button id=renderButton>Render</button>
                    </div>
                </div>
                <textarea style=width:500px;height:500px></textarea>
            </div>
            <div>
                <img id=svgArea></img>
            </div>
        </div>
        <script type="text/javascript" src="elk.bundled.js"></script>
        <script type="text/javascript" src="bundle.js"></script>
    </body>
</html>
