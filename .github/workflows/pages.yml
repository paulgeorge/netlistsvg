name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build browser bundle
        run: npm run build:bundle

      - name: Generate gallery
        run: npm run build:gallery

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/demo
          cp docs/index.html deploy/gallery.html
          cp built/netlistsvg.bundle.js deploy/bundle.js
          cp node_modules/elkjs/lib/elk.bundled.js deploy/elk.bundled.js
          cp demo/index.html deploy/index.html
          cp demo/demo.js deploy/demo/demo.js

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
